worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Define rate limiting zone: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=10r/s;

    server {
        listen 80;

        location / {
            # Apply rate limiting
            limit_req zone=ddos_limit burst=20 nodelay;
            
            # Proxy to HAProxy Load Balancer
            proxy_pass http://load-balancer:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
